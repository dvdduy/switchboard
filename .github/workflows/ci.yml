name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SWITCHBOARD_TEST_DATABASE_URL: >-
        postgresql+psycopg://switchboard:switchboard@localhost:5432/switchboard_test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: switchboard_test
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd
          "pg_isready -U switchboard -d switchboard_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Verify lock file
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linting
        run: uv run ruff check .

      - name: Run static typing
        run: uv run mypy

      - name: Run tests
        run: uv run pytest

      - name: Build container
        run: docker build --tag switchboard:ci .