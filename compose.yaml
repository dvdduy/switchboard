services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: switchboard
      POSTGRES_USER: switchboard
      POSTGRES_PASSWORD: switchboard
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U switchboard -d switchboard
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - switchboard-postgres-data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:17-alpine
    profiles:
      - test
    environment:
      POSTGRES_DB: switchboard_test
      POSTGRES_USER: switchboard
      POSTGRES_PASSWORD: switchboard
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U switchboard -d switchboard_test
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - switchboard-redis-data:/data

  api:
    build:
      context: .
    environment:
      SWITCHBOARD_ENVIRONMENT: local
      SWITCHBOARD_DATABASE_URL: >-
        postgresql+psycopg://switchboard:switchboard@postgres:5432/switchboard
      SWITCHBOARD_REDIS_URL: redis://redis:6379/0
      SWITCHBOARD_LOG_LEVEL: INFO
    command:
      - uvicorn
      - switchboard.bootstrap.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8000/health/ready',
          timeout=3
          )
      interval: 5s
      timeout: 4s
      retries: 10

  worker:
    build:
      context: .
    environment:
      SWITCHBOARD_ENVIRONMENT: local
      SWITCHBOARD_DATABASE_URL: >-
        postgresql+psycopg://switchboard:switchboard@postgres:5432/switchboard
      SWITCHBOARD_REDIS_URL: redis://redis:6379/0
      SWITCHBOARD_LOG_LEVEL: INFO
    command:
      - switchboard-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  switchboard-postgres-data:
  switchboard-redis-data: